<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formatação de links</title>
    <style>
/*cor de fundo*/
        body{
            background-color: black;
        }
/*cor do titulo*/
        h1{
            color: white;
        }
/*link normal*/
        a:link {
            color: blue;
            text-decoration: none;
        }
/*Link ja visitado*/
        a:visited {
            color: purple;
        }
/*Quando o mouse passa por cima*/
        a:hover {
            color: red;
            text-decoration: underline;
            font-size: 100px;
        }
/*enquanto o link é clicado*/
        a:active {
            color:orange;
        }
    </style>
</head>
<body>
    <h1>Formatação de links com CSS</h1>
    <p><a href="#">Formatação de links</a></p>
</body>
</html>
